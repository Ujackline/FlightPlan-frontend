<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background-color: #f0f0f0; padding: 10px; overflow: auto; max-height: 400px; }
        button { margin: 5px; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>API Endpoint Test</h1>
    <div>
        <h2>Token</h2>
        <div>
            <label for="token">Bearer Token:</label>
            <input type="text" id="token" size="50" />
            <button onclick="loadTokenFromStorage()">Load from localStorage</button>
        </div>
    </div>
    <div>
        <h2>API Endpoints</h2>
        <button onclick="testEndpoint('award')">Test /award</button>
        <button onclick="testEndpoint('awards')">Test /awards</button>
        <button onclick="testEndpoint('rewards')">Test /rewards</button>
        <button onclick="testEndpoint('reward')">Test /reward</button>
        <button onclick="listAllEndpoints()">Test all common endpoints</button>
    </div>
    <div>
        <h2>Custom Endpoint</h2>
        <input type="text" id="customEndpoint" placeholder="Enter custom endpoint" />
        <button onclick="testCustomEndpoint()">Test Custom Endpoint</button>
    </div>
    <div>
        <h2>Results</h2>
        <pre id="output">Results will appear here...</pre>
    </div>

    <script>
        const baseUrl = 'http://localhost:3029/flight-plan-t9';
        
        // Load token from localStorage
        function loadTokenFromStorage() {
            try {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (user && user.token) {
                    document.getElementById('token').value = user.token;
                    document.getElementById('output').textContent = 'Token loaded from localStorage.';
                } else {
                    document.getElementById('output').textContent = 'No token found in localStorage.';
                }
            } catch (error) {
                document.getElementById('output').textContent = 'Error loading token: ' + error.message;
            }
        }
        
        // Test a specific endpoint
        async function testEndpoint(endpoint) {
            const token = document.getElementById('token').value;
            if (!token) {
                document.getElementById('output').textContent = 'Please enter a token first.';
                return;
            }
            
            try {
                document.getElementById('output').textContent = `Testing ${baseUrl}/${endpoint}...`;
                
                const response = await fetch(`${baseUrl}/${endpoint}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                document.getElementById('output').innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        Status: ${response.status} ${response.statusText}
                        <br>Endpoint: ${endpoint}
                    </div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('output').innerHTML = `
                    <div class="error">
                        Error testing ${endpoint}: ${error.message}
                    </div>
                `;
            }
        }
        
        // Test a custom endpoint
        function testCustomEndpoint() {
            const endpoint = document.getElementById('customEndpoint').value;
            if (!endpoint) {
                document.getElementById('output').textContent = 'Please enter a custom endpoint.';
                return;
            }
            testEndpoint(endpoint);
        }
        
        // Test all common endpoints
        async function listAllEndpoints() {
            const token = document.getElementById('token').value;
            if (!token) {
                document.getElementById('output').textContent = 'Please enter a token first.';
                return;
            }
            
            const endpoints = [
                'award', 'Award', 'awards', 'Awards',
                'reward', 'Reward', 'rewards', 'Rewards',
                'student', 'students', 'badge', 'badges',
                'event', 'events'
            ];
            
            document.getElementById('output').textContent = 'Testing all endpoints...';
            const results = {};
            
            for (const endpoint of endpoints) {
                try {
                    const response = await fetch(`${baseUrl}/${endpoint}`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        results[endpoint] = {
                            status: response.status,
                            success: true,
                            data: data
                        };
                    } else {
                        results[endpoint] = {
                            status: response.status,
                            success: false,
                            error: response.statusText
                        };
                    }
                } catch (error) {
                    results[endpoint] = {
                        success: false,
                        error: error.message
                    };
                }
            }
            
            document.getElementById('output').innerHTML = `
                <h3>Endpoint Test Results</h3>
                <pre>${JSON.stringify(results, null, 2)}</pre>
            `;
        }
        
        // Load token on page load
        loadTokenFromStorage();
    </script>
</body>
</html>
